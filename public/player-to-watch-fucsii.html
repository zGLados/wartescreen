<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player To Watch - Fucsii</title>
    <link rel="stylesheet" href="/css/player-to-watch.css">
</head>
<body>
    <div id="bg-video-container">
        <video id="bg-video-local" muted playsinline preload="auto" poster=""></video>
    </div>

    <div class="content">
        <div class="logo-container">
            <img src="/partners/TacAM_logo.png" alt="TacAM" class="team-logo">
        </div>

        <div class="title">
            <div class="main-title">PLAYER TO WATCH</div>
        </div>

        <div class="player-showcase">
            <div class="player-image-container">
                <img id="playerAvatar" src="" alt="Player" class="player-avatar">
            </div>
            
            <div class="player-name" id="playerName">FUCSII</div>
        </div>

        <div class="stats-container">
            <div class="stat-item" id="stat1">
                <span class="stat-value">-</span>
                <span class="stat-label">Match MVPs This Season</span>
            </div>
            <div class="stat-item" id="stat2">
                <span class="stat-value">-</span>
                <span class="stat-label">Average Kills Per Match</span>
            </div>
            <div class="stat-item" id="stat3">
                <span class="stat-value">-</span>
                <span class="stat-label">Team Winrate This Season</span>
            </div>
            <div class="stat-item" id="stat4">
                <span class="stat-value">-</span>
                <span class="stat-label">K/D This Season</span>
            </div>
        </div>
    </div>

    <div class="partner-bar" id="partnerBar">
        <img src="/partners/TacAM_logo.png" class="partner-logo partner-fallback" alt="TacAM" id="tacamFallback">
    </div>

    <script>
        const PLAYER_ID = 'Fucs2i';
        const PLAYER_NAME = 'Fucsii';
    </script>
    <script src="/js/player-to-watch-single.js"></script>
</body>
</html>
