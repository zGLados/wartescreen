<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Veto Start Screen</title>
    <link rel="stylesheet" href="/css/viewer.css">
</head>
<body>
    <div id="bg-video-container">
        <!-- YouTube Player oder lokales Video -->
        <div id="bg-video-youtube"></div>
        <video id="bg-video-local" muted playsinline style="display: none;"></video>
    </div>

    <div id="timer-override-indicator" class="timer-override-indicator" style="display: none;">
        MANUAL TIMER
    </div>

    <div class="header">
        <div class="match-info-header">
            <h2 id="league-name">League Loading...</h2>
            <div id="match-format">BO?</div>
        </div>
        <div class="team-container">
            <div class="team-info">
                <img id="team1Logo" class="team-logo" src="" alt="">
                <span class="team-home" id="team1Name">TEAM A</span>
            </div>
            <div style="align-self: center; font-size: 2rem; opacity: 0.5;">VS</div>
            <div class="team-info">
                <img id="team2Logo" class="team-logo" src="" alt="">
                <span class="team-away" id="team2Name">TEAM B</span>
            </div>
        </div>
        <p id="current-action">Waiting for start...</p>
        <div id="timer">01:00</div>
    </div>

    <div class="map-grid" id="mapGrid">
        <!-- Maps werden per JS eingefügt -->
    </div>

    <!-- Partner-Leiste -->
    <div class="partner-bar" id="partnerBar">
        <!-- Fallback: TacAM Logo wenn keine anderen Partners -->
        <img src="/partners/TacAM_logo.png" class="partner-logo partner-fallback" alt="TacAM" id="tacamFallback">
    </div>

    <script src="/js/viewer.js"></script>
</body>
</html>
