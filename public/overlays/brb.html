<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Right Back</title>
    <link rel="stylesheet" href="/css/viewer.css">
    <style>
        /* Additional styles for BRB screen */
        .brb-content {
            text-align: center;
            z-index: 10;
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brb-title {
            font-size: 5rem;
            font-weight: 900;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0 0 20px 0;
            text-shadow: 0 0 40px rgba(200, 55, 55, 0.6);
        }

        .brb-subtitle {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 15px 0;
            font-weight: 300;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="bg-video-container">
        <video id="bg-video-local" muted playsinline preload="auto" poster="" style="display: none;"></video>
    </div>

    <div class="brb-content">
        <h1 class="brb-title">BE RIGHT BACK</h1>
        <p class="brb-subtitle">Taking a short break</p>
    </div>

    <!-- Partner-Leiste -->
    <div class="partner-bar" id="partnerBar">
        <!-- Fallback: TacAM Logo wenn keine anderen Partners -->
        <img src="/partners/TacAM_logo.png" class="partner-logo partner-fallback" alt="TacAM" id="tacamFallback">
    </div>

    <script>
        // Load configuration from server
        let VIDEO_FILES = [];
        let PARTNER_FILES = [];

        // Load config from server
        async function loadConfig() {
            try {
                // Fetch videos and partners separately
                const [videosRes, partnersRes] = await Promise.all([
                    fetch('/api/videos'),
                    fetch('/api/partners')
                ]);
                
                VIDEO_FILES = await videosRes.json();
                PARTNER_FILES = await partnersRes.json();
                
                console.log('[BRB] Loaded', VIDEO_FILES.length, 'videos');
                
                // Initialize after loading config
                initApp();
            } catch (error) {
                console.error('Failed to load config:', error);
                // Fallback to empty arrays
                VIDEO_FILES = [];
                PARTNER_FILES = [];
                initApp();
            }
        }

        let currentVideoIndex = 0;
        let isLoadingVideo = false;

        function initBackgroundVideo() {
            if (VIDEO_FILES && VIDEO_FILES.length > 0) {
                initLocalVideos();
            }
        }

        // Load and display partner logos
        function initPartners() {
            const partnerBar = document.getElementById('partnerBar');
            const fallbackLogo = document.getElementById('tacamFallback');
            
            if (PARTNER_FILES && PARTNER_FILES.length > 0) {
                // Real partner logos available - remove fallback
                if (fallbackLogo) {
                    fallbackLogo.remove();
                }
                
                // Insert partner logos
                PARTNER_FILES.forEach(file => {
                    const img = document.createElement('img');
                    img.src = `/partners/${file}`;
                    img.className = 'partner-logo';
                    img.alt = 'Partner';
                    img.onerror = () => {
                        console.error('Failed to load partner logo:', file);
                        img.style.display = 'none';
                    };
                    partnerBar.appendChild(img);
                });
            }
            // If no partner logos, fallback logo remains visible
        }

        // Initialize local videos
        function initLocalVideos() {
            const videoElement = document.getElementById('bg-video-local');
            videoElement.style.display = 'block';
            
            if (videoElement && VIDEO_FILES.length > 0) {
                // Random start video
                currentVideoIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                
                videoElement.addEventListener('ended', playNextLocalVideo);
                videoElement.addEventListener('error', (e) => {
                    console.error('Video error:', e);
                    isLoadingVideo = false;
                    setTimeout(playNextLocalVideo, 1000);
                });
                
                // Page Visibility API
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        videoElement.pause();
                        console.log('[Video] Page hidden - paused');
                    } else {
                        if (!isLoadingVideo && videoElement.paused) {
                            videoElement.play().catch(err => console.log('[Video] Resume failed:', err));
                            console.log('[Video] Page visible - resumed');
                        }
                    }
                });
                
                // Start video immediately (works in OBS and normal browsers)
                playNextLocalVideo();
                console.log('[Video] Starting video (visibility:', document.hidden ? 'hidden' : 'visible', ')');
                
                // Fallback: If video hasn't started after 5 seconds, force start
                setTimeout(() => {
                    if (videoElement.paused && !isLoadingVideo) {
                        console.warn('[Video] Fallback: forcing video start');
                        playNextLocalVideo();
                    }
                }, 5000);
            }
        }

        function playNextLocalVideo() {
            if (isLoadingVideo) return;
            
            const videoElement = document.getElementById('bg-video-local');
            if (!videoElement || VIDEO_FILES.length === 0) return;
            
            // Choose another random video (not the same)
            if (VIDEO_FILES.length > 1) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                } while (newIndex === currentVideoIndex);
                currentVideoIndex = newIndex;
            }
            
            isLoadingVideo = true;
            let loadingTimeout = null;
            let hasStartedPlaying = false;
            
            // Clear old source
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            
            // Set new video source (URL-encode)
            const videoFileName = encodeURIComponent(VIDEO_FILES[currentVideoIndex]);
            videoElement.src = `/videos/${videoFileName}`;
            videoElement.preload = 'auto';
            
            const startPlayback = () => {
                if (hasStartedPlaying) return;
                hasStartedPlaying = true;
                if (loadingTimeout) clearTimeout(loadingTimeout);
                videoElement.play().catch(err => {
                    console.log('Autoplay prevented:', err);
                    isLoadingVideo = false;
                });
                isLoadingVideo = false;
            };
            
            videoElement.addEventListener('canplaythrough', function onCanPlayThrough() {
                videoElement.removeEventListener('canplaythrough', onCanPlayThrough);
                startPlayback();
            }, { once: true });
            
            setTimeout(() => {
                if (!hasStartedPlaying && videoElement.readyState >= 3) {
                    startPlayback();
                }
            }, 3000);
            
            loadingTimeout = setTimeout(() => {
                if (!hasStartedPlaying) {
                    console.warn('Video timeout, skipping');
                    isLoadingVideo = false;
                    playNextLocalVideo();
                }
            }, 30000);
        }

        // App initialisieren (wird nach Config-Laden aufgerufen)
        function initApp() {
            initBackgroundVideo();
            initPartners();
        }

        // Config laden und App starten
        loadConfig();
    </script>
</body>
</html>
