<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACAM Roster</title>
    <link rel="stylesheet" href="/css/viewer.css">
    <style>
        .roster-container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .roster-header {
            margin-bottom: 50px;
        }

        .roster-logo {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(200, 55, 55, 0.4));
        }

        .roster-title {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .esea-title {
            font-size: 2.5rem;
            color: var(--accent-red);
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(200, 55, 55, 0.5);
        }

        .players-grid {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-top: 60px;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .player:hover {
            transform: translateY(-10px);
        }

        .player-image {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--card-bg);
            transition: all 0.3s ease;
        }

        .player:hover .player-image {
            border-color: var(--accent-red);
            box-shadow: 0 8px 40px rgba(200, 55, 55, 0.5);
        }

        .player-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .player-role {
            font-size: 1.1rem;
            color: var(--accent-red);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive design */
        @media (max-width: 1400px) {
            .players-grid {
                gap: 30px;
            }
            
            .player-image {
                width: 150px;
                height: 180px;
            }
            
            .player-name {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 1100px) {
            .players-grid {
                flex-wrap: wrap;
                gap: 40px;
            }
            
            .player-image {
                width: 160px;
                height: 200px;
            }
        }

        @media (max-width: 768px) {
            .roster-title {
                font-size: 2.5rem;
            }
            
            .esea-title {
                font-size: 1.8rem;
            }
            
            .players-grid {
                gap: 25px;
            }
            
            .player-image {
                width: 140px;
                height: 170px;
            }
            
            .player-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div id="bg-video-container">
        <video id="bg-video-local" muted playsinline preload="auto" poster="" style="display: none;"></video>
    </div>

    <div class="roster-container">
        <div class="roster-header">
            <div class="esea-title">ESEA S57 OPEN10</div>
            <img src="/partners/TacAM_logo.png" alt="TACAM Logo" class="roster-logo">
            <div class="roster-title">TACAM ROSTER</div>
        </div>

        <div class="players-grid">
            <div class="player">
                <img src="/playerpic/aindrew.png" alt="Aindrew" class="player-image">
                <div class="player-name">Aindrew</div>
                <div class="player-role">Rifler</div>
            </div>

            <div class="player">
                <img src="/playerpic/cln.png" alt="cLn" class="player-image">
                <div class="player-name">cLn</div>
                <div class="player-role">AWPer</div>
            </div>

            <div class="player">
                <img src="/playerpic/bravo.png" alt="Bravo" class="player-image">
                <div class="player-name">Bravo</div>
                <div class="player-role">IGL</div>
            </div>

            <div class="player">
                <img src="/playerpic/fucsii.png" alt="Fucsii" class="player-image">
                <div class="player-name">Fucsii</div>
                <div class="player-role">Support</div>
            </div>

            <div class="player">
                <img src="/playerpic/henzzik.png" alt="Henzzik" class="player-image">
                <div class="player-name">Henzzik</div>
                <div class="player-role">Lurk</div>
            </div>
        </div>
    </div>

    <script>
        // Load configuration from server
        let VIDEO_FILES = [];

        // Load config from server
        async function loadConfig() {
            try {
                const videosRes = await fetch('/api/videos');
                VIDEO_FILES = await videosRes.json();
                
                console.log('[Roster] Loaded', VIDEO_FILES.length, 'videos');
                
                // Initialize after loading config
                initBackgroundVideo();
            } catch (error) {
                console.error('Failed to load config:', error);
                VIDEO_FILES = [];
                initBackgroundVideo();
            }
        }

        let currentVideoIndex = 0;
        let isLoadingVideo = false;

        function initBackgroundVideo() {
            if (VIDEO_FILES && VIDEO_FILES.length > 0) {
                initLocalVideos();
            }
        }

        // Initialize local videos
        function initLocalVideos() {
            const videoElement = document.getElementById('bg-video-local');
            videoElement.style.display = 'block';
            
            if (videoElement && VIDEO_FILES.length > 0) {
                // Random start video
                currentVideoIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                
                videoElement.addEventListener('ended', playNextLocalVideo);
                videoElement.addEventListener('error', (e) => {
                    console.error('Video error:', e);
                    isLoadingVideo = false;
                    setTimeout(playNextLocalVideo, 1000);
                });
                
                // Page Visibility API
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        videoElement.pause();
                        console.log('[Video] Page hidden - paused');
                    } else {
                        if (!isLoadingVideo && videoElement.paused) {
                            videoElement.play().catch(err => console.log('[Video] Resume failed:', err));
                            console.log('[Video] Page visible - resumed');
                        }
                    }
                });
                
                // Start video immediately (works in OBS and normal browsers)
                playNextLocalVideo();
                console.log('[Video] Starting video (visibility:', document.hidden ? 'hidden' : 'visible', ')');
                
                // Fallback: If video hasn't started after 5 seconds, force start
                setTimeout(() => {
                    if (videoElement.paused && !isLoadingVideo) {
                        console.warn('[Video] Fallback: forcing video start');
                        playNextLocalVideo();
                    }
                }, 5000);
            }
        }

        function playNextLocalVideo() {
            if (isLoadingVideo) return;
            
            const videoElement = document.getElementById('bg-video-local');
            if (!videoElement || VIDEO_FILES.length === 0) return;
            
            // Choose another random video (not the same)
            if (VIDEO_FILES.length > 1) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                } while (newIndex === currentVideoIndex);
                currentVideoIndex = newIndex;
            }
            
            isLoadingVideo = true;
            let loadingTimeout = null;
            let hasStartedPlaying = false;
            
            // Clear old source
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            
            // Set new video source (URL-encode)
            const videoFileName = encodeURIComponent(VIDEO_FILES[currentVideoIndex]);
            videoElement.src = `/videos/${videoFileName}`;
            videoElement.preload = 'auto';
            
            const startPlayback = () => {
                if (hasStartedPlaying) return;
                hasStartedPlaying = true;
                if (loadingTimeout) clearTimeout(loadingTimeout);
                videoElement.play().catch(err => {
                    console.log('Autoplay prevented:', err);
                    isLoadingVideo = false;
                });
                isLoadingVideo = false;
            };
            
            videoElement.addEventListener('canplaythrough', function onCanPlayThrough() {
                videoElement.removeEventListener('canplaythrough', onCanPlayThrough);
                startPlayback();
            }, { once: true });
            
            setTimeout(() => {
                if (!hasStartedPlaying && videoElement.readyState >= 3) {
                    startPlayback();
                }
            }, 3000);
            
            loadingTimeout = setTimeout(() => {
                if (!hasStartedPlaying) {
                    console.warn('Video timeout, skipping');
                    isLoadingVideo = false;
                    playNextLocalVideo();
                }
            }, 30000);
        }

        // Config laden und App starten
        loadConfig();
    </script>
</body>
</html>
