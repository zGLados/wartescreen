<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Break</title>
    <link rel="stylesheet" href="/css/viewer.css">
    <style>
        /* Additional styles for pause screen */
        .pause-content {
            text-align: center;
            z-index: 10;
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pause-icon {
            font-size: 8rem;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .pause-title {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0 0 20px 0;
            text-shadow: 0 0 40px rgba(200, 55, 55, 0.6);
        }

        .pause-subtitle {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 15px 0;
            font-weight: 300;
            opacity: 0.9;
        }

        .pause-text {
            font-size: 1.3rem;
            color: #aaa;
            margin: 0 0 40px 0;
            font-weight: 300;
        }

        .pause-spinner {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .spinner-dot {
            width: 20px;
            height: 20px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .spinner-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .spinner-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="bg-video-container">
        <video id="bg-video-local" muted playsinline style="display: none;"></video>
    </div>

    <div class="pause-content">
        <div class="pause-icon">⚠️</div>
        <h1 class="pause-title">TECHNICAL BREAK</h1>
        <p class="pause-subtitle">We are currently fixing a technical issue</p>
        <p class="pause-text">Please bear with us for a moment</p>
        <div class="pause-spinner">
            <div class="spinner-dot"></div>
            <div class="spinner-dot"></div>
            <div class="spinner-dot"></div>
        </div>
    </div>

    <!-- Partner-Leiste -->
    <div class="partner-bar" id="partnerBar">
        <!-- Fallback: TacAM Logo wenn keine anderen Partners -->
        <img src="/partners/TacAM_logo.png" class="partner-logo partner-fallback" alt="TacAM" id="tacamFallback">
    </div>

    <script>
        // Load configuration from server
        let VIDEO_FILES = [];
        let PARTNER_FILES = [];

        // Load config from server
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                
                VIDEO_FILES = config.videoFiles;
                PARTNER_FILES = config.partnerFiles || [];
                
                // Initialize after loading config
                initApp();
            } catch (error) {
                console.error('Failed to load config:', error);
                // Fallback to default values
                initApp();
            }
        }

        let currentVideoIndex = 0;

        function initBackgroundVideo() {
            if (VIDEO_FILES && VIDEO_FILES.length > 0) {
                initLocalVideos();
            }
        }

        // Load and display partner logos
        function initPartners() {
            const partnerBar = document.getElementById('partnerBar');
            const fallbackLogo = document.getElementById('tacamFallback');
            
            if (PARTNER_FILES && PARTNER_FILES.length > 0) {
                // Real partner logos available - remove fallback
                if (fallbackLogo) {
                    fallbackLogo.remove();
                }
                
                // Insert partner logos
                PARTNER_FILES.forEach(file => {
                    const img = document.createElement('img');
                    img.src = `/partners/${file}`;
                    img.className = 'partner-logo';
                    img.alt = 'Partner';
                    img.onerror = () => {
                        console.error('Failed to load partner logo:', file);
                        img.style.display = 'none';
                    };
                    partnerBar.appendChild(img);
                });
            }
            // If no partner logos, fallback logo remains visible
        }

        // Initialize local videos
        function initLocalVideos() {
            const videoElement = document.getElementById('bg-video-local');
            videoElement.style.display = 'block';
            
            if (videoElement && VIDEO_FILES.length > 0) {
                // Random start video
                currentVideoIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                
                videoElement.onended = () => {
                    // Choose another random video (not the same)
                    if (VIDEO_FILES.length > 1) {
                        let newIndex;
                        do {
                            newIndex = Math.floor(Math.random() * VIDEO_FILES.length);
                        } while (newIndex === currentVideoIndex);
                        currentVideoIndex = newIndex;
                    }
                    playNextLocalVideo();
                };
                playNextLocalVideo();
            }
        }

        function playNextLocalVideo() {
            const videoElement = document.getElementById('bg-video-local');
            if (!videoElement) return;
            videoElement.src = `/videos/${VIDEO_FILES[currentVideoIndex]}`;
            videoElement.play().catch(e => console.log("Video Autoplay failed:", e));
        }

        // App initialisieren (wird nach Config-Laden aufgerufen)
        function initApp() {
            initBackgroundVideo();
            initPartners();
        }

        // Config laden und App starten
        loadConfig();
    </script>
</body>
</html>
