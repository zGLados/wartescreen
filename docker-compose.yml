version: '3.8'

services:
  faceit-wartescreen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faceit-wartescreen
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - FACEIT_API_KEY=${FACEIT_API_KEY}
      - PORT=3001
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SHOW_VETO=${SHOW_VETO:-false}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-5000}
      - YOUTUBE_PLAYLIST_URL=${YOUTUBE_PLAYLIST_URL}
    volumes:
      # Mount videos directory (read-write for compression)
      - ./videos:/app/videos
      # Mount partners directory for partner/sponsor logos
      - ./public/partners:/app/public/partners:ro
    networks:
      - wartescreen-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  wartescreen-network:
    driver: bridge
